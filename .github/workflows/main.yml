name: Update Dependencies

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          # Cache hier deaktiviert, um den Fehler zu vermeiden

      - name: Update package.json
        run: |
          # --yes sorgt dafür, dass npx nicht interaktiv nachfragt
          npx --yes npm-check-updates -u
          # Erstellt oder aktualisiert die Lock-Datei
          npm install

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dependencies to latest"
          title: "Automatisches Update der Abhängigkeiten"
          body: "Dieser PR aktualisiert alle npm-Pakete auf die neuesten Versionen (via ncu)."
          branch: "auto-dep-update"
          delete-branch: true
